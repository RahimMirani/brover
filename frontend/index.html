<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BROVER // OPS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="hud">
      <div class="hud__brand">
        <span class="hud__logo">BROVER</span>
        <span class="hud__sep">//</span>
        <span class="hud__sub">autonomous teleop</span>
      </div>
      <div class="hud__status">
        <span class="conn">
          <span class="conn__dot" id="connDot"></span>
          <span class="conn__text" id="connText">OFFLINE</span>
        </span>
        <span class="hud__divider"></span>
        <span class="mode" id="modeBadge" data-mode="idle">IDLE</span>
      </div>
    </header>

    <main class="viewport">
      <section class="feed">
        <img id="video" src="stream.mjpg" alt="" draggable="false">
        <div class="feed__overlay">
          <div class="overlay tl">
            <span class="rec-dot"></span>
            <span>CAM-01 &middot; LIVE</span>
          </div>
          <div class="overlay tr" id="clock">--:--:--</div>
          <div class="overlay bl">RES 640&times;480 &middot; 30FPS</div>
          <div class="overlay br" id="sessionId">SID --------</div>
          <div class="zoom" aria-label="Zoom">
            <button class="zoom__btn" id="zoomIn"  aria-label="Zoom in">+</button>
            <div class="zoom__val" id="zoomVal">1.00x</div>
            <button class="zoom__btn" id="zoomOut" aria-label="Zoom out">&minus;</button>
          </div>
          <div class="crosshair" aria-hidden="true">
            <span class="crosshair__h"></span>
            <span class="crosshair__v"></span>
          </div>
        </div>
      </section>

      <aside class="log">
        <div class="log__head">
          <span>EVENT LOG</span>
          <span class="log__count" id="logCount">0</span>
        </div>
        <div class="log__body" id="logBody"></div>
      </aside>
    </main>

    <footer class="controls">
      <div class="dpad" aria-label="Manual drive">
        <button class="pad pad--up"    data-cmd="forward"  aria-label="Forward"><svg viewBox="0 0 24 24"><path d="M12 5l-9 9h6v5h6v-5h6z"/></svg></button>
        <button class="pad pad--left"  data-cmd="left"     aria-label="Left"><svg viewBox="0 0 24 24"><path d="M5 12l9-9v6h5v6h-5v6z"/></svg></button>
        <button class="pad pad--stop"  id="padStop"        aria-label="Stop"><svg viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="1"/></svg></button>
        <button class="pad pad--right" data-cmd="right"    aria-label="Right"><svg viewBox="0 0 24 24"><path d="M19 12l-9-9v6H5v6h5v6z"/></svg></button>
        <button class="pad pad--down"  data-cmd="backward" aria-label="Backward"><svg viewBox="0 0 24 24"><path d="M12 19l9-9h-6V5H9v5H3z"/></svg></button>
      </div>

      <button class="mic" id="micBtn" aria-label="Hold to talk">
        <span class="mic__ring"></span>
        <span class="mic__ring mic__ring--2"></span>
        <span class="mic__core">
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
        </span>
        <span class="mic__label">HOLD &middot; TALK</span>
      </button>

      <button class="estop" id="estopBtn" aria-label="Emergency stop">
        <span class="estop__ring"></span>
        <span class="estop__text">E&#8209;STOP</span>
      </button>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
